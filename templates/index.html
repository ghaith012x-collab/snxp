<!DOCTYPE html>
<html>
<head>
    <title>LIVE Linux Browser Control</title>
    <style>
        body { background: #0a0a0f; color: #ddd; font-family: system-ui, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 10px; }
        .controls { 
            background: #1a1a2e; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; color: #888; }
        input { 
            padding: 10px 14px; 
            background: #111; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            font-size: 15px;
            width: 260px;
        }
        button { 
            padding: 12px 20px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #2563eb; }
        .action-btn { background: #22c55e; }
        .danger { background: #ef4444; }
        
        .browser-frame {
            background: #1e1e1e;
            border: 12px solid #222;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            width: 1280px;
            max-width: 100%;
        }
        .live-label {
            background: #ef4444;
            color: white;
            font-size: 13px;
            padding: 4px 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .status-bar {
            background: #111;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            color: #22c55e;
        }
        #live-img {
            width: 100%;
            display: block;
            image-rendering: crisp-edges;
        }
        .log {
            background: #111;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            max-height: 180px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ LIVE Linux Browser Control</h1>
        <p style="color:#888; margin-bottom:20px;">You control the browser. Every click and keystroke updates the live screenshot.</p>

        <div class="controls">
            <div class="control-group">
                <label>Phone Number</label>
                <input id="phone" type="text" value="+47 40300869">
            </div>
            
            <button onclick="doAction('type_phone')">Type Phone</button>
            <button onclick="doAction('click_login')" class="action-btn">Click Log In</button>
            
            <div class="control-group">
                <label>6-Digit Code</label>
                <input id="code" type="text" placeholder="123456" maxlength="6">
            </div>
            
            <button onclick="doAction('type_code')">Type Code</button>
            <button onclick="doAction('submit_code')" class="action-btn">Submit Code</button>
            
            <button onclick="doAction('reset')" class="danger">Reset Browser</button>
        </div>

        <div class="browser-frame">
            <div class="live-label">LIVE LINUX BROWSER — accounts.snapchat.com</div>
            <img id="live-img" src="/screenshot?t=0">
            <div class="status-bar" id="status-bar">Ready • Waiting for your commands</div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        const statusBar = document.getElementById('status-bar');
        
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
        }
        
        async function doAction(action) {
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();
            
            let payload = { action };
            
            if (action === 'type_phone') payload.value = phone;
            if (action === 'type_code') payload.value = code;
            
            try {
                const res = await fetch('/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                log(`Action: ${action} → ${data.last_action || ''}`);
                statusBar.textContent = data.last_action || 'Done';
                
                // Force immediate screenshot refresh
                forceRefresh();
            } catch(e) {
                log('Error: ' + e);
            }
        }
        
        let refreshCount = 0;
        
        async function forceRefresh() {
            const img = document.getElementById('live-img');
            refreshCount++;
            const ts = Date.now();
            
            try {
                const res = await fetch('/screenshot?cb=' + ts + '&r=' + refreshCount);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                img.src = url;
                
                // Also update status
                const statusRes = await fetch('/status');
                const s = await statusRes.json();
                if (s.last_action) statusBar.textContent = s.last_action;
            } catch(e) {}
        }
        
        // Very aggressive refresh
        setInterval(forceRefresh, 650);
        
        // Initial load
        setTimeout(forceRefresh, 100);
        setTimeout(forceRefresh, 400);
        setTimeout(forceRefresh, 900);
        
        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const code = document.getElementById('code').value.trim();
                if (code.length >= 4) {
                    doAction('submit_code');
                } else {
                    doAction('click_login');
                }
            }
        });
        
        log('Linux browser ready. Use the buttons above to control it.');
    </script>
</body>
</html>
